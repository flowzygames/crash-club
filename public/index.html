<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crash Club v1.0</title>
    <meta
      name="description"
      content="Crash Club is a multiplayer 3D browser driving arena with bot-filled rooms, powerups, wrecks, and Wi-Fi play."
    />
    <meta name="theme-color" content="#08121d" />
    <meta property="og:title" content="Crash Club" />
    <meta property="og:description" content="A chaotic browser driving arena for friends on the same Wi-Fi." />
    <meta property="og:image" content="/og-image.svg" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="is-menu-open">
    <div class="release-screen" id="release-screen">
      <div class="release-card">
        <span class="eyebrow">Crash Club v1.0</span>
        <h1>Multiplayer car chaos in your browser.</h1>
        <p>
          Jump into a room, fight bots while friends connect, grab powerups, and win rounds by wrecking rivals
          or owning the gold scoring ring.
        </p>
        <div class="release-actions">
          <label>
            Driver Name
            <input id="name-input" maxlength="18" placeholder="Pick a name" />
          </label>
          <button id="start-button" class="primary-action" onclick="document.getElementById('name-input')?.blur();this.blur();">Start Driving</button>
          <button id="rename-button" class="secondary-action">Save Name</button>
        </div>
        <div class="release-notes">
          <span><strong>WASD</strong> drive</span>
          <span><strong>Shift</strong> boost</span>
          <span><strong>R</strong> respawn</span>
          <span><strong>Esc</strong> menu</span>
        </div>
      </div>
    </div>

    <div class="hud"> ... (same as before, unchanged for brevity) ... </div>

    <script>
      window.addEventListener(
        'keydown',
        (event) => {
          const drivingKeys = new Set(['w', 'a', 's', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'shift']);
          const key = (event.key || '').toLowerCase();
          if (!drivingKeys.has(key)) return;
          const active = document.activeElement;
          if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable)) {
            active.blur();
          }
        },
        true
      );
    </script>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
