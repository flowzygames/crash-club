name: Install Game Polish

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/install-game-polish.yml

permissions:
  contents: write

jobs:
  install:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Three.js
        run: npm install three@0.164.1 --save

      - name: Apply gameplay polish
        run: node scripts/apply-game-polish.js

      - name: Verify game syntax
        run: npm run check

      - name: Commit polish and remove one-time installer
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/install-game-polish.yml
          git rm -f scripts/apply-game-polish.js
          git add package.json package-lock.json server.js public/app.js public/index.html public/styles.css public/vendor/three.module.js
          if git diff --cached --quiet; then
            echo "No game polish changes to commit."
          else
            git commit -m "Polish driving feel and bundle Three.js locally"
            git push
          fi
