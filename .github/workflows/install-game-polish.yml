name: Install Game Polish

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/install-game-polish.yml

permissions:
  contents: write

jobs:
  install:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install local Three.js dependency
        run: npm install three@0.164.1 --save

      - name: Copy browser Three.js module
        run: |
          mkdir -p public/vendor
          cp node_modules/three/build/three.module.js public/vendor/three.module.js

      - name: Apply gameplay polish patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def patch(path, edits):
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              for old, new in edits:
                  if old not in text:
                      raise SystemExit(f"Patch marker not found in {path}: {old[:90]!r}")
                  text = text.replace(old, new, 1)
              file.write_text(text, encoding="utf-8")

          patch("public/index.html", [
              ('          "three": "https://unpkg.com/three@0.164.1/build/three.module.js"', '          "three": "/vendor/three.module.js"'),
              ('    <div class="damage-vignette" id="damage-vignette"></div>\n    <div id="app"></div>', '    <div class="damage-vignette" id="damage-vignette"></div>\n    <div class="speed-lines" id="speed-lines" aria-hidden="true"></div>\n    <div id="app"></div>')
          ])

          patch("server.js", [
              ('  ".json": "application/json; charset=utf-8",\n  ".png": "image/png",', '  ".json": "application/json; charset=utf-8",\n  ".webmanifest": "application/manifest+json; charset=utf-8",\n  ".png": "image/png",'),
              ('  ".jpg": "image/jpeg",\n  ".svg": "image/svg+xml"', '  ".jpg": "image/jpeg",\n  ".gif": "image/gif",\n  ".svg": "image/svg+xml"'),
              ('    y: 0.85,\n    z: Math.sin(spawnAngle) * spawnRadius,', '    y: 0.08,\n    z: Math.sin(spawnAngle) * spawnRadius,'),
              ('    target.wrecks += 1;\n    target.wreckedUntil = now + WRECK_RESPAWN_MS;', '    source.wrecks = (source.wrecks || 0) + 1;\n    target.wreckedUntil = now + WRECK_RESPAWN_MS;'),
              ('    bot.y = 0.85;', '    bot.y = 0.08;')
          ])

          patch("public/styles.css", [
              ('\nkbd,\ncode {', '''
.speed-lines {
  --speed-line-opacity: 0;
  position: fixed;
  inset: 0;
  z-index: 17;
  pointer-events: none;
  opacity: var(--speed-line-opacity);
  background:
    radial-gradient(circle at 50% 54%, transparent 0 25%, rgba(255, 255, 255, 0.08) 26%, transparent 42%),
    repeating-conic-gradient(
      from 0deg at 50% 55%,
      transparent 0deg 11deg,
      rgba(126, 184, 255, 0.18) 12deg 13deg,
      transparent 14deg 22deg
    );
  mix-blend-mode: screen;
  transition: opacity 140ms ease;
}

kbd,
code {''')
          ])

          patch("public/app.js", [
              ('    const CENTER_MIN = 8;\n    const CENTER_MAX = 19;', '    const CENTER_MIN = 8;\n    const CENTER_MAX = 19;\n    const MAX_EFFECTS = 110;'),
              ('      bannerKicker: document.getElementById("round-kicker"),\n      bannerMessage: document.getElementById("round-message"),\n      damage: document.getElementById("damage-vignette")', '      bannerKicker: document.getElementById("round-kicker"),\n      bannerMessage: document.getElementById("round-message"),\n      damage: document.getElementById("damage-vignette"),\n      speedLines: document.getElementById("speed-lines")'),
              ('      lastStateAt: 0,\n      lastHitAt: 0,\n      lastStyleAt: 0,', '      lastStateAt: 0,\n      lastHitAt: 0,\n      lastStyleAt: 0,\n      lastWallHitAt: 0,'),
              ('        wreckedUntil: 0,\n        driftCharge: 0,\n        name: loadName(),', '        wreckedUntil: 0,\n        driftCharge: 0,\n        cameraShake: 0,\n        lastBoostTrailAt: 0,\n        lastSkidSmokeAt: 0,\n        boosting: false,\n        name: loadName(),'),
              ('    renderer.toneMapping = THREE.ACESFilmicToneMapping;\n    renderer.toneMappingExposure = 1.08;\n    els.app.appendChild(renderer.domElement);', '    renderer.toneMapping = THREE.ACESFilmicToneMapping;\n    renderer.toneMappingExposure = 1.08;\n    renderer.outputColorSpace = THREE.SRGBColorSpace;\n    els.app.appendChild(renderer.domElement);\n    const particleGeometry = new THREE.SphereGeometry(1, 8, 6);'),
              ('      for (let i = 0; i < 14; i += 1) {\n        addStreetLight(Math.cos(i * 0.9) * 102, Math.sin(i * 0.9) * 102);\n      }', '      for (let i = 0; i < 14; i += 1) {\n        addStreetLight(Math.cos(i * 0.9) * 102, Math.sin(i * 0.9) * 102);\n      }\n\n      for (let i = 0; i < 12; i += 1) {\n        const angle = (i / 12) * Math.PI * 2;\n        addTrackChevron(Math.cos(angle) * 31, Math.sin(angle) * 31, -angle + Math.PI / 2, i % 2 ? "#59f0c2" : "#ffcf6b");\n      }\n\n      addBillboard(-118, -54, Math.PI / 5, "BOOST", "#59f0c2");\n      addBillboard(118, 52, -Math.PI / 1.2, "WRECK", "#ff4f8b");\n      addBillboard(-70, 120, Math.PI, "RING", "#ffcf6b");'),
              ('    function addSkyDetails() {', '''    function addTrackChevron(x, z, rotation, color) {
      const shape = new THREE.Shape();
      shape.moveTo(0, 2.9);
      shape.lineTo(3.2, 0);
      shape.lineTo(1.35, 0);
      shape.lineTo(0, 1.08);
      shape.lineTo(-1.35, 0);
      shape.lineTo(-3.2, 0);
      shape.closePath();
      const mesh = new THREE.Mesh(
        new THREE.ShapeGeometry(shape),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.58, side: THREE.DoubleSide })
      );
      mesh.rotation.set(-Math.PI / 2, 0, rotation);
      mesh.position.set(x, 0.08, z);
      scene.add(mesh);
    }

    function addBillboard(x, z, rotation, title, accent) {
      const group = new THREE.Group();
      const postMat = new THREE.MeshStandardMaterial({ color: "#0b1018", metalness: 0.25, roughness: 0.55 });
      const boardMat = new THREE.MeshBasicMaterial({ map: makeBillboardTexture(title, accent), transparent: true });
      const board = new THREE.Mesh(new THREE.PlaneGeometry(20, 8), boardMat);
      board.position.y = 9.5;
      const leftPost = new THREE.Mesh(new THREE.BoxGeometry(0.6, 9, 0.6), postMat);
      const rightPost = leftPost.clone();
      leftPost.position.set(-7.6, 4.5, -0.15);
      rightPost.position.set(7.6, 4.5, -0.15);
      group.add(board, leftPost, rightPost);
      group.position.set(x, 0, z);
      group.rotation.y = rotation;
      scene.add(group);
    }

    function makeBillboardTexture(title, accent) {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 192;
      const ctx = canvas.getContext("2d");
      const gradient = ctx.createLinearGradient(0, 0, 512, 192);
      gradient.addColorStop(0, "rgba(7, 13, 24, 0.96)");
      gradient.addColorStop(1, "rgba(16, 30, 45, 0.94)");
      ctx.fillStyle = gradient;
      roundRect(ctx, 18, 18, 476, 156, 24);
      ctx.fill();
      ctx.strokeStyle = accent;
      ctx.lineWidth = 7;
      ctx.stroke();
      ctx.fillStyle = accent;
      ctx.font = "900 72px Trebuchet MS, Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(title, 256, 88);
      ctx.fillStyle = "rgba(245, 247, 251, 0.86)";
      ctx.font = "700 24px Trebuchet MS, Arial";
      ctx.fillText("CRASH CLUB", 256, 135);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function addSkyDetails() {'''),
              ('      const boosting = !blocked && input.has("shift") && car.boost > 3 && throttle > 0;', '      const boosting = !blocked && input.has("shift") && car.boost > 3 && throttle > 0;\n      car.boosting = boosting;'),
              ('          car.velocity.multiplyScalar(0.62);\n          spawnImpact(car.x, 1.1, car.z, "#d6f4ff", 7);', '          car.velocity.multiplyScalar(0.62);\n          const now = performance.now();\n          if (now - state.lastWallHitAt > 160) {\n            state.lastWallHitAt = now;\n            car.cameraShake = Math.max(car.cameraShake, THREE.MathUtils.clamp(Math.abs(hitSpeed) / 34, 0.1, 0.46));\n            spawnImpact(car.x, 1.1, car.z, "#d6f4ff", 7);\n          }'),
              ('          car.velocity.addScaledVector(normal, 12);\n          car.velocity.multiplyScalar(0.82);\n          spawnImpact(entry.x, 1.4, entry.z, state.car.slamUntil > Date.now() ? "#ff4f8b" : "#ffcf6b", 12);', '          car.velocity.addScaledVector(normal, 12);\n          car.velocity.multiplyScalar(0.82);\n          car.cameraShake = Math.max(car.cameraShake, state.car.slamUntil > Date.now() ? 0.72 : 0.46);\n          spawnImpact(entry.x, 1.4, entry.z, state.car.slamUntil > Date.now() ? "#ff4f8b" : "#ffcf6b", 12);'),
              ('        mesh.target.set(entry.x, entry.y || 0.85, entry.z);', '        mesh.target.set(entry.x, entry.y ?? 0.08, entry.z);'),
              ('          y: player.y || 0.08,', '          y: player.y ?? 0.08,'),
              ('      return entry ? { x: entry.x, y: entry.y || 0.08, z: entry.z } : null;', '      return entry ? { x: entry.x, y: entry.y ?? 0.08, z: entry.z } : null;'),
              ('      localCar.underglow.intensity = boosting ? 2.2 : 1.05;\n      car.inZone = isInCenterRing(car.x, car.z);', '      localCar.underglow.intensity = boosting ? 2.2 : 1.05;\n      if (els.speedLines) {\n        const streaks = boosting ? 0.42 : THREE.MathUtils.clamp((car.speed - 28) / 46, 0, 0.25);\n        els.speedLines.style.setProperty("--speed-line-opacity", String(streaks));\n      }\n      car.inZone = isInCenterRing(car.x, car.z);'),
              ('''    function updateCamera(dt) {
      const car = state.car;
      const speedPull = THREE.MathUtils.clamp(car.speed / 50, 0, 1);
      const back = 13 + speedPull * 7;
      const height = 7.5 + speedPull * 2.5;
      const desired = scratch3.set(
        car.x - Math.sin(car.angle) * back,
        car.y + height,
        car.z - Math.cos(car.angle) * back
      );
      camera.position.lerp(desired, 1 - Math.pow(0.0009, dt));
      camera.lookAt(car.x, car.y + 2.2, car.z);
    }''', '''    function updateCamera(dt) {
      const car = state.car;
      const speedPull = THREE.MathUtils.clamp(car.speed / 50, 0, 1);
      const boostPull = car.boosting ? 1 : 0;
      const back = 13 + speedPull * 7 + boostPull * 2.2;
      const height = 7.5 + speedPull * 2.5 + boostPull * 0.8;
      const desired = scratch3.set(
        car.x - Math.sin(car.angle) * back,
        car.y + height,
        car.z - Math.cos(car.angle) * back
      );
      camera.position.lerp(desired, 1 - Math.pow(0.0009, dt));
      if (car.cameraShake > 0.001) {
        const shake = car.cameraShake;
        camera.position.x += (Math.random() - 0.5) * shake;
        camera.position.y += (Math.random() - 0.5) * shake * 0.45;
        camera.position.z += (Math.random() - 0.5) * shake;
        car.cameraShake = Math.max(0, car.cameraShake - dt * 2.4);
      }
      const targetFov = 62 + speedPull * 4 + boostPull * 3;
      if (Math.abs(camera.fov - targetFov) > 0.05) {
        camera.fov = THREE.MathUtils.lerp(camera.fov, targetFov, 1 - Math.pow(0.002, dt));
        camera.updateProjectionMatrix();
      }
      camera.lookAt(car.x, car.y + 2.2, car.z);
    }'''),
              ('          scene.remove(effect.mesh);\n          effect.mesh.geometry.dispose();\n          effect.mesh.material.dispose();', '          scene.remove(effect.mesh);\n          effect.mesh.material.dispose();'),
              ('    function spawnBoostTrail() {\n      const car = state.car;', '    function spawnBoostTrail() {\n      const car = state.car;\n      const now = performance.now();\n      if (now - car.lastBoostTrailAt < 42) return;\n      car.lastBoostTrailAt = now;'),
              ('    function spawnSkidSmoke(amount) {\n      const car = state.car;', '    function spawnSkidSmoke(amount) {\n      const car = state.car;\n      const now = performance.now();\n      if (now - car.lastSkidSmokeAt < 55) return;\n      car.lastSkidSmokeAt = now;'),
              ('    function spawnParticle(x, y, z, color, life, grow, velocity, opacity = 0.5) {\n      const mesh = new THREE.Mesh(\n        new THREE.SphereGeometry(0.18 + Math.random() * 0.18, 8, 6),\n        new THREE.MeshBasicMaterial({ color, transparent: true, opacity })\n      );\n      mesh.position.set(x, y, z);\n      scene.add(mesh);\n      effects.push({ mesh, life, maxLife: life, grow, velocity, opacity });\n    }', '    function spawnParticle(x, y, z, color, life, grow, velocity, opacity = 0.5) {\n      while (effects.length >= MAX_EFFECTS) {\n        const oldest = effects.shift();\n        if (!oldest) break;\n        scene.remove(oldest.mesh);\n        oldest.mesh.material.dispose();\n      }\n      const mesh = new THREE.Mesh(\n        particleGeometry,\n        new THREE.MeshBasicMaterial({ color, transparent: true, opacity })\n      );\n      mesh.position.set(x, y, z);\n      const size = 0.18 + Math.random() * 0.18;\n      mesh.scale.setScalar(size);\n      scene.add(mesh);\n      effects.push({ mesh, life, maxLife: life, grow, velocity, opacity });\n    }')
          ])
          PY

      - name: Verify patched game
        run: npm run check

      - name: Commit polish and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/install-game-polish.yml
          git add package.json package-lock.json server.js public/app.js public/index.html public/styles.css public/vendor/three.module.js
          if git diff --cached --quiet; then
            echo "No game polish changes to commit."
          else
            git commit -m "Polish driving feel and bundle Three.js locally"
            git push
          fi
