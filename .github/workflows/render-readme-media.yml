name: Render README Media

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/render-readme-media.yml
      - scripts/capture-readme-media.js
      - scripts/build-readme-gif.py
      - README.md
      - server.js
      - public/**

permissions:
  contents: write

jobs:
  render:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stage local Three.js for capture
        shell: bash
        run: |
          set -euo pipefail
          npm install three@0.164.1 --no-save
          mkdir -p public/vendor
          cp node_modules/three/build/three.module.js public/vendor/three.module.js
          node - <<'NODE'
          const fs = require("fs");
          const file = "public/index.html";
          const html = fs.readFileSync(file, "utf8");
          fs.writeFileSync(
            file,
            html.replace(
              "https://unpkg.com/three@0.164.1/build/three.module.js",
              "/vendor/three.module.js"
            )
          );
          NODE

      - name: Install GIF tools
        run: python -m pip install Pillow

      - name: Capture real 1080p gameplay media
        run: node scripts/capture-readme-media.js

      - name: Build full-resolution gameplay GIF
        run: python scripts/build-readme-gif.py

      - name: Commit rendered media and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f assets/readme/github/*.jpg || true
          git rm -f .github/workflows/render-readme-media.yml
          git add README.md assets/readme/github scripts/capture-readme-media.js scripts/build-readme-gif.py
          if git diff --cached --quiet; then
            echo "No README media changes to commit."
          else
            git commit -m "Add 1080p README gameplay media"
            git push
          fi
