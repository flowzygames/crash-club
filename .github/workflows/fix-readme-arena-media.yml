name: Fix README Arena Media

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-readme-arena-media.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  fix-media:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          npm install
          python -m pip install --upgrade pip
          python -m pip install pillow
      - name: Find browser
        shell: bash
        run: |
          BROWSER_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$BROWSER_PATH" ]; then
            echo "No Chrome/Chromium browser found on runner."
            exit 1
          fi
          echo "CHROME_PATH=$BROWSER_PATH" >> "$GITHUB_ENV"
      - name: Patch README-safe capture
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          server = Path('server.js')
          text = server.read_text()
          if 'CRASH_CLUB_README_SAFE_ARENA === "1" && !target.isBot' not in text:
              text = text.replace(
                  '  if (!source || !target || target.mode === "spectator" || target.mode === "gulag" || target.wreckedUntil > now || room.round.phase !== "live") {\n    return;\n  }\n\n  const shielded = target.shieldUntil > now;',
                  '  if (!source || !target || target.mode === "spectator" || target.mode === "gulag" || target.wreckedUntil > now || room.round.phase !== "live") {\n    return;\n  }\n  if (process.env.CRASH_CLUB_README_SAFE_ARENA === "1" && !target.isBot) {\n    return;\n  }\n\n  const shielded = target.shieldUntil > now;'
              )
          if 'CRASH_CLUB_README_SAFE_ARENA === "1") {\n    return;\n  }\n  const winnerByScore' not in text:
              text = text.replace(
                  '  if (room.round.phase !== "live") {\n    return;\n  }\n  const winnerByScore = [...room.players.values()].find((player) => player.score >= ROUND_WIN_SCORE);',
                  '  if (room.round.phase !== "live") {\n    return;\n  }\n  if (process.env.CRASH_CLUB_README_SAFE_ARENA === "1") {\n    return;\n  }\n  const winnerByScore = [...room.players.values()].find((player) => player.score >= ROUND_WIN_SCORE);'
              )
          server.write_text(text)

          capture = Path('scripts/capture-readme-media.js')
          text = capture.read_text()
          text = text.replace(
              '"--ignore-gpu-blocklist",\n      "--use-gl=swiftshader",',
              '"--ignore-gpu-blocklist",\n      "--enable-unsafe-swiftshader",\n      "--disable-dev-shm-usage",\n      "--use-gl=swiftshader",'
          )
          text = text.replace(
              '        env: { ...process.env, PORT: String(serverPort) },',
              '        env: {\n          ...process.env,\n          PORT: String(serverPort),\n          CRASH_CLUB_README_SAFE_ARENA: captureOnly === "arena" ? "1" : process.env.CRASH_CLUB_README_SAFE_ARENA\n        },'
          )
          if 'async function assertArenaShot' not in text:
              text = text.replace(
                  'async function hold(send, keys, ms) {\n  for (const item of keys) await key(send, "rawKeyDown", ...item);\n  await sleep(ms);\n  for (const item of [...keys].reverse()) await key(send, "keyUp", ...item);\n}\n',
                  'async function hold(send, keys, ms) {\n  for (const item of keys) await key(send, "rawKeyDown", ...item);\n  await sleep(ms);\n  for (const item of [...keys].reverse()) await key(send, "keyUp", ...item);\n}\n\nasync function assertArenaShot(send, label) {\n  const status = await evalPage(send, `({\n    objective: document.querySelector("#objective-card")?.textContent || "",\n    combatVisible: Boolean(document.querySelector(".mode-overlay.combat-hud:not(.hidden)")),\n    modeText: document.querySelector("#mode-title")?.textContent || ""\n  })`);\n  const value = status.result?.value || {};\n  const text = `${value.objective} ${value.modeText}`;\n  if (value.combatVisible || /gulag|spectator|free cam/i.test(text)) {\n    throw new Error(`Refusing to save ${label} because the capture is not in the arena: ${JSON.stringify(value)}`);\n  }\n}\n'
              )
          for before, after in {
              '      await sleep(1400);\n      await capture(send, "02-arena-hud.png");': '      await sleep(1400);\n      await assertArenaShot(send, "02-arena-hud.png");\n      await capture(send, "02-arena-hud.png");',
              '      await sleep(700);\n      await capture(send, "03-center-ring-powerups.png");': '      await sleep(700);\n      await assertArenaShot(send, "03-center-ring-powerups.png");\n      await capture(send, "03-center-ring-powerups.png");',
              '      await sleep(550);\n      await capture(send, "04-bots-and-radar.png");': '      await sleep(550);\n      await assertArenaShot(send, "04-bots-and-radar.png");\n      await capture(send, "04-bots-and-radar.png");',
              '      await sleep(450);\n      await capture(send, "05-driving-action.png");': '      await sleep(450);\n      await assertArenaShot(send, "05-driving-action.png");\n      await capture(send, "05-driving-action.png");',
          }.items():
              if before in text and after not in text:
                  text = text.replace(before, after)
          capture.write_text(text)
          PY
      - name: Validate syntax
        run: npm run check && node --check scripts/capture-readme-media.js
      - name: Capture fixed arena screenshots
        env:
          CRASH_CLUB_CAPTURE_ONLY: "arena"
          CRASH_CLUB_CAPTURE_GULAG: "0"
        run: node scripts/capture-readme-media.js
      - name: Verify screenshots
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          from PIL import Image
          for name in ['01-start-screen.png','02-arena-hud.png','03-center-ring-powerups.png','04-bots-and-radar.png','05-driving-action.png','06-gulag-duel.png']:
              path = Path('assets/readme/github') / name
              im = Image.open(path)
              print(name, im.size, path.stat().st_size)
              if im.size != (1920, 1080):
                  raise SystemExit(f'{name} is not 1920x1080')
          PY
      - name: Commit README media fix
        shell: bash
        run: |
          git config user.name "flowzygames-readme-bot"
          git config user.email "actions@github.com"
          git rm --ignore-unmatch .github/workflows/fix-readme-arena-media.yml
          git add server.js scripts/capture-readme-media.js assets/readme/github/01-start-screen.png assets/readme/github/02-arena-hud.png assets/readme/github/03-center-ring-powerups.png assets/readme/github/04-bots-and-radar.png assets/readme/github/05-driving-action.png
          git commit -m "Fix README driving screenshots"
          git push origin HEAD:main
