name: README Gulag Media Update

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/readme-gulag-update.yml

permissions:
  contents: write

jobs:
  install:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download README media update
        run: |
          set -euo pipefail
          curl -L "https://litter.catbox.moe/49bqge.zip" -o /tmp/readme-gulag-update.zip
          set +e
          unzip -o /tmp/readme-gulag-update.zip -d .
          unzip_status=$?
          set -e
          if [ "$unzip_status" -gt 1 ]; then
            exit "$unzip_status"
          fi
          test -s README.md
          test -s public/index.html
          test -s scripts/capture-gulag-readme.js
          test -s assets/readme/github/gulag-duel.gif
          test -s assets/readme/github/06-gulag-duel.png
          test -s assets/readme/github/driving-loop.gif

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify README and game files
        run: |
          npm run check
          node - <<'NODE'
          const fs = require("fs");
          const readme = fs.readFileSync("README.md", "utf8");
          const index = fs.readFileSync("public/index.html", "utf8");
          const assets = [
            "01-start-screen.png",
            "02-arena-hud.png",
            "03-center-ring-powerups.png",
            "04-bots-and-radar.png",
            "05-driving-action.png",
            "06-gulag-duel.png",
            "driving-loop.gif",
            "gulag-duel.gif"
          ];
          const checks = {
            readmeGulagGif: readme.includes("./assets/readme/github/gulag-duel.gif"),
            readmeGulagRules: readme.includes("Gulag Duels And Redeploys") && readme.includes("Winning the duel sends the player back into the arena"),
            readmeControls: readme.includes("Shoot in Gulag") && readme.includes("Free-cam height"),
            alphaBranding: index.includes("Crash Club Alpha 1.2") && index.includes("v1.2.2"),
            assetsPresent: assets.every((file) => fs.existsSync(`assets/readme/github/${file}`) && fs.statSync(`assets/readme/github/${file}`).size > 10000)
          };
          console.log(checks);
          if (Object.values(checks).some((value) => !value)) process.exit(1);
          NODE

      - name: Commit README Gulag update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/readme-gulag-update.yml
          git add README.md public/index.html scripts/capture-gulag-readme.js assets/readme/github
          git commit -m "Update README with Gulag media"
          git push
