name: Slow Gameplay Preview GIF

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/slow-gameplay-preview.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  slow-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          npm install
          python -m pip install --upgrade pip
          python -m pip install pillow
      - name: Find browser
        shell: bash
        run: |
          BROWSER_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$BROWSER_PATH" ]; then
            echo "No Chrome/Chromium browser found on runner."
            exit 1
          fi
          echo "CHROME_PATH=$BROWSER_PATH" >> "$GITHUB_ENV"
          echo "Using browser: $BROWSER_PATH"
      - name: Validate game syntax
        run: npm run check && node --check scripts/capture-readme-media.js
      - name: Capture gameplay frames
        env:
          CRASH_CLUB_CAPTURE_ONLY: "arena"
          CRASH_CLUB_CAPTURE_GULAG: "0"
        run: node scripts/capture-readme-media.js
      - name: Build slower gameplay GIF
        run: python scripts/build-readme-gif.py test-results/readme-frames assets/readme/github/driving-loop.gif 130
      - name: Verify GIF pace and size
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          from PIL import Image
          path = Path('assets/readme/github/driving-loop.gif')
          im = Image.open(path)
          frames = getattr(im, 'n_frames', 1)
          duration = im.info.get('duration')
          print(path, im.size, frames, duration, path.stat().st_size)
          if im.size != (1920, 1080):
              raise SystemExit('driving-loop.gif is not 1920x1080')
          if frames < 30:
              raise SystemExit('driving-loop.gif has too few frames')
          if duration is None or duration < 110:
              raise SystemExit('driving-loop.gif is still too fast')
          PY
      - name: Commit slower preview
        shell: bash
        run: |
          git config user.name "flowzygames-readme-bot"
          git config user.email "actions@github.com"
          git rm --ignore-unmatch .github/workflows/slow-gameplay-preview.yml
          git add assets/readme/github/driving-loop.gif
          git commit -m "Slow README gameplay preview GIF"
          git push origin HEAD:main
